name: Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Existing release tag, for example v0.10.15'
        required: true
        type: string
      macos_audio_gate_run_id:
        description: 'Successful macOS Audio Release Gate run ID for the same tagged commit'
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: release-${{ github.event.inputs.tag || github.ref }}
  cancel-in-progress: false

env:
  RELEASE_TAG: ${{ github.event.inputs.tag || github.ref_name }}

jobs:
  quality-gates:
    uses: ./.github/workflows/quality-gates.yml
    with:
      ref: ${{ inputs.tag }}

  verify-macos-audio-gate:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout release tag
        uses: actions/checkout@v6.0.2
        with:
          ref: ${{ env.RELEASE_TAG }}
          fetch-depth: 0

      - name: Verify macOS audio evidence
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          AUDIO_GATE_RUN_ID: ${{ inputs.macos_audio_gate_run_id }}
        run: |
          set -euo pipefail

          if [[ ! "$AUDIO_GATE_RUN_ID" =~ ^[0-9]+$ ]]; then
            echo "::error::macos_audio_gate_run_id must be a numeric GitHub Actions run ID."
            exit 1
          fi

          release_commit="$(git rev-parse HEAD)"
          required_matrix_ids='["english_to_russian","names_and_numbers","technical_terms","mixed_english_russian","already_russian","long_context","pause_and_silence","overlapping_speakers","half_volume_source"]'
          required_audio_ids='["english_to_russian","names_and_numbers","technical_terms","mixed_english_russian","long_context","pause_and_silence","overlapping_speakers","half_volume_source"]'
          diagnostic_semantic_ids='["overlapping_speakers"]'
          diagnostic_audio_fact_policies='[["names_and_numbers","meeting time 3:45 PM"]]'
          run_json="$(gh run view "$AUDIO_GATE_RUN_ID" \
            --repo "$GITHUB_REPOSITORY" \
            --json conclusion,event,workflowName,url)"
          conclusion="$(jq -r .conclusion <<< "$run_json")"
          workflow_name="$(jq -r .workflowName <<< "$run_json")"
          event="$(jq -r .event <<< "$run_json")"
          run_url="$(jq -r .url <<< "$run_json")"

          if [[ "$workflow_name" != "macOS Audio Release Gate" || "$event" != "workflow_dispatch" || "$conclusion" != "success" ]]; then
            echo "::error::Run $AUDIO_GATE_RUN_ID is not a successful manual macOS Audio Release Gate run: $run_url"
            exit 1
          fi

          gh run download "$AUDIO_GATE_RUN_ID" \
            --repo "$GITHUB_REPOSITORY" \
            --name macos-audio-gate-evidence \
            --dir audio-gate-evidence
          (
            cd audio-gate-evidence
            shasum -a 256 -c SHA256SUMS
          )
          while IFS= read -r scenario; do
            test -s "audio-gate-evidence/incoming-spoken-paid-matrix/$scenario/source-primary.aiff"
            test -s "audio-gate-evidence/incoming-spoken-paid-matrix/$scenario/captured-input.wav"
            test -s "audio-gate-evidence/incoming-spoken-paid-matrix/$scenario/captured-input-transcript.txt"
            test -e "audio-gate-evidence/incoming-spoken-paid-matrix/$scenario/translated-transcript.txt"
            test -s "audio-gate-evidence/incoming-spoken-paid-matrix/$scenario/metrics.json"
          done < <(jq -r '.[]' <<< "$required_matrix_ids")
          while IFS= read -r scenario; do
            test -s "audio-gate-evidence/incoming-spoken-paid-matrix/$scenario/translated-audio.wav"
            test -s "audio-gate-evidence/incoming-spoken-paid-matrix/$scenario/translated-audio-transcript.txt"
          done < <(jq -r '.[]' <<< "$required_audio_ids")
          jq -e \
            --arg commit "$release_commit" \
            --argjson audio_gate_run_id "$AUDIO_GATE_RUN_ID" \
            --argjson required_matrix_ids "$required_matrix_ids" \
            --argjson required_audio_ids "$required_audio_ids" \
            --argjson diagnostic_semantic_ids "$diagnostic_semantic_ids" \
            --argjson diagnostic_audio_fact_policies "$diagnostic_audio_fact_policies" \
            '.commit == $commit and
             .manual_attestation_run_id == $audio_gate_run_id and
             .soak_seconds >= 1800 and
             .smoke_passed == true and
             .soak_passed == true and
             .tauri_exit_shutdown_callback_bound == true and
             .shutdown_claim_idempotence_passed == true and
             .bidirectional_runtime_abort_helper_passed == true and
             .suspension_signal_and_capture_cleanup_contracts_passed == true and
             .local_and_runtime_close_contracts_passed == true and
             .output_signal_and_service_cleanup_contracts_passed == true and
             .system_default_playback_passed == true and
             .macos_default_output_switch_detected == true and
             .blackhole_loopback_passed == true and
             .incoming_native_capture_format_passed == true and
             .incoming_playback_burst_passed == true and
             .outgoing_live_translation_passed == true and
             .incoming_captions_regression_passed == true and
             .incoming_stop_mid_phrase_passed == true and
             .incoming_paid_network_interruption_passed == true and
             .manual_attestations.zoom_half_volume_bidirectional == true and
             .manual_attestations.output_disconnect_recovery == true and
             .manual_attestations.sleep_wake_recovery == true and
             (.manual_attestation_actor | type) == "string" and
             (.manual_attestation_actor | length) > 0 and
             .paid_matrix_complete == true and
             .paid_matrix.schema_version == 1 and
             .paid_matrix.scenario_filter == "all" and
             .paid_matrix.required_scenario_ids == $required_matrix_ids and
             .paid_matrix.passed_scenario_ids == $required_matrix_ids and
             .paid_matrix.required_audio_scenario_ids == $required_audio_ids and
             .paid_matrix.audio_verified_scenario_ids == $required_audio_ids and
             .paid_matrix.diagnostic_semantic_scenario_ids == $diagnostic_semantic_ids and
             .paid_matrix.diagnostic_audio_fact_policies == $diagnostic_audio_fact_policies and
             ((.paid_matrix.quality_degraded_scenario_ids - ($diagnostic_semantic_ids + ($diagnostic_audio_fact_policies | map(.[0])))) | length) == 0 and
             .native_spoken_soak.schema_version == 1 and
             .native_spoken_soak.soak_seconds >= 1800 and
             .native_spoken_soak.release_grade == true and
             .native_spoken_soak.source_play_count == 7 and
             .native_spoken_soak.translated_text_chars > 0 and
             .native_spoken_soak.translated_audible_samples > 0 and
             .native_spoken_soak.playback_dropped_batches == 0 and
             .native_spoken_soak.playback_pending_high_water_ms <= 2000 and
             .native_spoken_soak.playback_pending_at_close_ms <= 30 and
             (.native_spoken_soak.rss_samples_kib | type) == "array" and
             (.native_spoken_soak.rss_samples_kib | length) >= 2 and
             .native_spoken_soak.rss_growth_kib <= 32768 and
             (.native_spoken_soak.last_translation_text_age_ms | type) == "number" and
             .native_spoken_soak.last_translation_text_age_ms <= 120000 and
             (.native_spoken_soak.last_translation_audio_age_ms | type) == "number" and
             .native_spoken_soak.last_translation_audio_age_ms <= 120000 and
             (.native_spoken_soak.errors | type) == "array" and
             (.native_spoken_soak.errors | length) == 0 and
             .spoken_restart_stress.schema_version == 1 and
             .spoken_restart_stress.cycles == 25 and
             .spoken_restart_stress.capture_starts == 25 and
             .spoken_restart_stress.capture_stops == 25 and
             .spoken_restart_stress.output_opens == 25 and
             .spoken_restart_stress.output_closes == 25 and
             .spoken_restart_stress.translation_sessions_created == 25 and
             .spoken_restart_stress.translation_sessions_dropped == 25 and
             .spoken_restart_stress.translation_finishes == 25 and
             .spoken_restart_stress.translation_aborts == 0 and
             .spoken_restart_stress.post_stop_send_attempts == 25 and
             .spoken_restart_stress.error_callbacks == 0 and
             .spoken_restart_stress.active_capture_high_water == 1 and
             .spoken_restart_stress.active_output_high_water == 1 and
             .spoken_restart_stress.active_translation_session_high_water == 1 and
             .spoken_restart_stress.active_translation_task_high_water == 1 and
             .spoken_restart_stress.active_websocket_high_water == 1 and
             .spoken_restart_stress.active_server_task_high_water == 1 and
             (.spoken_restart_stress.rss_samples_kib | type) == "array" and
             (.spoken_restart_stress.rss_samples_kib | length) >= 2 and
             .spoken_restart_stress.rss_growth_kib <= 16384 and
             (.smoke_checks | index("tauri-exit-shutdown-callback-binding")) != null and
             (.smoke_checks | index("translation-shutdown-claim-idempotence")) != null and
             (.smoke_checks | index("bidirectional-runtime-abort-helper")) != null and
             (.smoke_checks | index("suspension-watchdog-terminal-signal")) != null and
             (.smoke_checks | index("incoming-terminal-capture-service-cleanup")) != null and
             (.smoke_checks | index("local-websocket-abrupt-close")) != null and
             (.smoke_checks | index("outgoing-unexpected-close-service-cleanup")) != null and
             (.smoke_checks | index("output-health-terminal-signal")) != null and
             (.smoke_checks | index("incoming-output-terminal-service-cleanup")) != null and
             (.smoke_checks | index("incoming-system-default-playback")) != null and
             (.smoke_checks | index("macos-default-output-switch")) != null and
             (.smoke_checks | index("blackhole-loopback")) != null and
             (.smoke_checks | index("incoming-native-capture-format")) != null and
             (.smoke_checks | index("incoming-playback-nine-second-burst")) != null and
             (.smoke_checks | index("incoming-native-self-exclusion")) != null and
             (.smoke_checks | index("outgoing-live-translation-service")) != null and
             (.smoke_checks | index("incoming-captions-regression")) != null and
             (.smoke_checks | index("incoming-spoken-paid-matrix")) != null and
             (.smoke_checks | index("incoming-spoken-stop-mid-phrase")) != null and
             (.smoke_checks | index("incoming-spoken-paid-network-interruption")) != null and
             (.smoke_checks | index("paid-full-duplex-independent-stop")) != null and
             (.soak_checks | index("blackhole-loopback-preflight")) != null and
             (.soak_checks | index("incoming-spoken-runtime-soak")) != null and
             (.soak_checks | index("incoming-spoken-restart-stress")) != null and
             (.soak_checks | index("incoming-spoken-native-soak")) != null and
             (.soak_checks | index("outgoing-long-live-translation-soak")) != null and
             (.soak_checks | index("incoming-long-system-audio-soak")) != null' \
            audio-gate-evidence/evidence.json >/dev/null
          jq -e \
            --argjson required_matrix_ids "$required_matrix_ids" \
            --argjson required_audio_ids "$required_audio_ids" \
            --argjson diagnostic_semantic_ids "$diagnostic_semantic_ids" \
            --argjson diagnostic_audio_fact_policies "$diagnostic_audio_fact_policies" \
            '
            .schema_version == 1 and
            .scenario_filter == "all" and
            .complete_release_matrix == true and
            .required_scenario_ids == $required_matrix_ids and
            .passed_scenario_ids == $required_matrix_ids and
            .required_audio_scenario_ids == $required_audio_ids and
            .audio_verified_scenario_ids == $required_audio_ids and
            .diagnostic_semantic_scenario_ids == $diagnostic_semantic_ids and
            .diagnostic_audio_fact_policies == $diagnostic_audio_fact_policies and
            ((.quality_degraded_scenario_ids - ($diagnostic_semantic_ids + ($diagnostic_audio_fact_policies | map(.[0])))) | length) == 0
          ' audio-gate-evidence/matrix-summary.json >/dev/null

          echo "Verified macOS audio gate $run_url for commit $release_commit"

  create-release:
    needs:
      - quality-gates
      - verify-macos-audio-gate
    runs-on: ubuntu-24.04
    outputs:
      release_id: ${{ steps.release.outputs.release_id }}
      release_tag: ${{ steps.resolve.outputs.release_tag }}
      release_commit: ${{ steps.resolve.outputs.release_commit }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.2
        with:
          ref: ${{ env.RELEASE_TAG }}
          fetch-depth: 0

      - name: Resolve release tag
        id: resolve
        shell: bash
        run: |
          set -euo pipefail

          tag="${RELEASE_TAG}"
          if [[ ! "$tag" =~ ^v[0-9]+\.[0-9]+\.[0-9]+([+-][0-9A-Za-z.-]+)?$ ]]; then
            echo "::error::Release tag must look like v0.10.15, got '$tag'."
            exit 1
          fi

          git fetch --force --tags origin "refs/tags/${tag}:refs/tags/${tag}"
          commit="$(git rev-list -n 1 "$tag")"

          echo "release_tag=$tag" >> "$GITHUB_OUTPUT"
          echo "release_commit=$commit" >> "$GITHUB_OUTPUT"

      - name: Setup Node.js
        uses: actions/setup-node@v6.4.0
        with:
          node-version: lts/*

      - name: Prepare release notes
        shell: bash
        run: node scripts/prepare-release-notes.mjs "${{ steps.resolve.outputs.release_tag }}" > release-notes.md

      - name: Create or update draft GitHub release
        id: release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ steps.resolve.outputs.release_tag }}
          RELEASE_COMMIT: ${{ steps.resolve.outputs.release_commit }}
        run: |
          set -euo pipefail

          version="${RELEASE_TAG#v}"
          title="VoicetextAI v${version}"

          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            is_draft="$(gh release view "$RELEASE_TAG" --json isDraft --jq .isDraft)"
            if [[ "$is_draft" != "true" ]]; then
              echo "::error::Release $RELEASE_TAG is already public; refusing to replace it during a release build."
              exit 1
            fi
            gh release edit "$RELEASE_TAG" \
              --title "$title" \
              --notes-file release-notes.md \
              --draft=true \
              --prerelease=false \
              --verify-tag \
              --target "$RELEASE_COMMIT"
          else
            gh release create "$RELEASE_TAG" \
              --title "$title" \
              --notes-file release-notes.md \
              --draft=true \
              --prerelease=false \
              --verify-tag \
              --target "$RELEASE_COMMIT"
          fi

          release_id="$(gh release view "$RELEASE_TAG" --json databaseId --jq .databaseId)"
          if [[ -z "$release_id" || "$release_id" == "null" ]]; then
            echo "::error::Failed to resolve GitHub release id for $RELEASE_TAG."
            exit 1
          fi

          echo "release_id=$release_id" >> "$GITHUB_OUTPUT"

  build-release:
    needs: create-release
    strategy:
      fail-fast: false
      max-parallel: 1
      matrix:
        include:
          - platform: 'ubuntu-24.04'
            args: ''

          - platform: 'windows-latest'
            args: ''

          - platform: 'macos-latest'
            args: '--target x86_64-apple-darwin'

          - platform: 'macos-latest'
            args: '--target aarch64-apple-darwin'

    runs-on: ${{ matrix.platform }}
    env:
      RELEASE_ID: ${{ needs.create-release.outputs.release_id }}
      RELEASE_TAG: ${{ needs.create-release.outputs.release_tag }}
      RELEASE_COMMIT: ${{ needs.create-release.outputs.release_commit }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.2
        with:
          ref: ${{ env.RELEASE_TAG }}

      - name: Setup Node.js
        uses: actions/setup-node@v6.4.0
        with:
          node-version: lts/*

      - name: Install pnpm
        uses: pnpm/action-setup@v6.0.8
        with:
          version: 9.15.9

      - name: Clone and build state-sync
        run: |
          git clone --depth 1 https://github.com/777genius/state-sync.git ../state-sync
          cd ../state-sync
          pnpm install
          pnpm build

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2.9.1
        with:
          workspaces: './src-tauri -> target'

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-24.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            build-essential \
            curl \
            wget \
            file \
            libxdo-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libasound2-dev \
            pkg-config

      - name: Import Apple certificate
        if: matrix.platform == 'macos-latest'
        shell: bash
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          set -euo pipefail

          CERTIFICATE_PATH="$RUNNER_TEMP/certificate.p12"
          KEYCHAIN_PATH="$RUNNER_TEMP/app-signing.keychain-db"
          KEYCHAIN_PASSWORD="$(openssl rand -base64 32)"

          echo -n "$APPLE_CERTIFICATE" | base64 --decode > "$CERTIFICATE_PATH"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          security import "$CERTIFICATE_PATH" -P "$APPLE_CERTIFICATE_PASSWORD" \
            -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: \
            -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          existing_keychains=()
          while IFS= read -r keychain; do
            existing_keychains+=("${keychain//\"/}")
          done < <(security list-keychains -d user)
          security list-keychains -d user -s "$KEYCHAIN_PATH" "${existing_keychains[@]}"

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Build and release
        uses: tauri-apps/tauri-action@v0.6.2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          APPLE_SIGNING_IDENTITY: 'Developer ID Application: Oleksii Zelenko (6C84CW694S)'
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          VITE_API_URL: https://api.voicetext.site
          VOICE_TO_TEXT_BACKEND_URL: wss://api.voicetext.site
        with:
          releaseId: ${{ env.RELEASE_ID }}
          releaseCommitish: ${{ env.RELEASE_COMMIT }}
          tagName: ${{ env.RELEASE_TAG }}
          retryAttempts: 3
          uploadUpdaterJson: true
          uploadUpdaterSignatures: true
          args: ${{ matrix.args }}

  verify-release:
    needs:
      - create-release
      - build-release
    runs-on: ubuntu-24.04
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      RELEASE_TAG: ${{ needs.create-release.outputs.release_tag }}

    steps:
      - name: Verify draft release assets and updater manifest
        shell: bash
        run: |
          set -euo pipefail

          version="${RELEASE_TAG#v}"
          is_draft="$(gh release view "$RELEASE_TAG" --repo "$GITHUB_REPOSITORY" --json isDraft --jq .isDraft)"
          if [[ "$is_draft" != "true" ]]; then
            echo "::error::Release $RELEASE_TAG became public before asset verification completed."
            exit 1
          fi

          assets="$(gh release view "$RELEASE_TAG" --repo "$GITHUB_REPOSITORY" --json assets --jq '.assets[].name')"
          required_assets=(
            latest.json
            "VoicetextAI_${version}_aarch64.dmg"
            "VoicetextAI_aarch64.app.tar.gz"
            "VoicetextAI_aarch64.app.tar.gz.sig"
            "VoicetextAI_${version}_x64.dmg"
            "VoicetextAI_x64.app.tar.gz"
            "VoicetextAI_x64.app.tar.gz.sig"
            "VoicetextAI_${version}_x64_en-US.msi"
            "VoicetextAI_${version}_x64_en-US.msi.sig"
            "VoicetextAI_${version}_amd64.deb"
            "VoicetextAI_${version}_amd64.deb.sig"
            "VoicetextAI_${version}_amd64.AppImage"
            "VoicetextAI_${version}_amd64.AppImage.sig"
          )

          for asset in "${required_assets[@]}"; do
            if ! grep -Fxq "$asset" <<< "$assets"; then
              echo "::error::Release asset is missing: $asset"
              exit 1
            fi
          done

          gh release download "$RELEASE_TAG" \
            --repo "$GITHUB_REPOSITORY" \
            --pattern latest.json \
            --clobber

          jq -e --arg version "$version" '.version == $version' latest.json >/dev/null

          required_platforms=(
            darwin-aarch64
            darwin-aarch64-app
            darwin-x86_64
            darwin-x86_64-app
            linux-x86_64
            linux-x86_64-appimage
            linux-x86_64-deb
            windows-x86_64
            windows-x86_64-msi
          )

          for platform in "${required_platforms[@]}"; do
            jq -e --arg platform "$platform" \
              '.platforms[$platform].url and .platforms[$platform].signature' \
              latest.json >/dev/null
          done

  publish-release:
    needs:
      - create-release
      - verify-release
    runs-on: ubuntu-24.04
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      RELEASE_TAG: ${{ needs.create-release.outputs.release_tag }}

    steps:
      - name: Publish verified release
        shell: bash
        run: |
          set -euo pipefail

          gh release edit "$RELEASE_TAG" \
            --repo "$GITHUB_REPOSITORY" \
            --draft=false \
            --prerelease=false \
            --latest \
            --verify-tag

          latest_tag="$(gh release view --repo "$GITHUB_REPOSITORY" --json tagName --jq .tagName)"
          if [[ "$latest_tag" != "$RELEASE_TAG" ]]; then
            echo "::error::Latest GitHub release is $latest_tag, expected $RELEASE_TAG."
            exit 1
          fi
