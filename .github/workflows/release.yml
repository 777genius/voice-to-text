name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Existing release tag, for example v0.10.15'
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: release-${{ github.event.inputs.tag || github.ref }}
  cancel-in-progress: false

env:
  RELEASE_TAG: ${{ github.event.inputs.tag || github.ref_name }}

jobs:
  create-release:
    runs-on: ubuntu-24.04
    outputs:
      release_id: ${{ steps.release.outputs.release_id }}
      release_tag: ${{ steps.resolve.outputs.release_tag }}
      release_commit: ${{ steps.resolve.outputs.release_commit }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.2
        with:
          ref: ${{ env.RELEASE_TAG }}
          fetch-depth: 0

      - name: Resolve release tag
        id: resolve
        shell: bash
        run: |
          set -euo pipefail

          tag="${RELEASE_TAG}"
          if [[ ! "$tag" =~ ^v[0-9]+\.[0-9]+\.[0-9]+([+-][0-9A-Za-z.-]+)?$ ]]; then
            echo "::error::Release tag must look like v0.10.15, got '$tag'."
            exit 1
          fi

          git fetch --force --tags origin "refs/tags/${tag}:refs/tags/${tag}"
          commit="$(git rev-list -n 1 "$tag")"

          echo "release_tag=$tag" >> "$GITHUB_OUTPUT"
          echo "release_commit=$commit" >> "$GITHUB_OUTPUT"

      - name: Setup Node.js
        uses: actions/setup-node@v6.4.0
        with:
          node-version: lts/*

      - name: Prepare release notes
        shell: bash
        run: node scripts/prepare-release-notes.mjs "${{ steps.resolve.outputs.release_tag }}" > release-notes.md

      - name: Create or update GitHub release
        id: release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ steps.resolve.outputs.release_tag }}
          RELEASE_COMMIT: ${{ steps.resolve.outputs.release_commit }}
        run: |
          set -euo pipefail

          version="${RELEASE_TAG#v}"
          title="VoicetextAI v${version}"

          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            gh release edit "$RELEASE_TAG" \
              --title "$title" \
              --notes-file release-notes.md \
              --draft=false \
              --prerelease=false \
              --latest \
              --verify-tag \
              --target "$RELEASE_COMMIT"
          else
            gh release create "$RELEASE_TAG" \
              --title "$title" \
              --notes-file release-notes.md \
              --draft=false \
              --prerelease=false \
              --latest \
              --verify-tag \
              --target "$RELEASE_COMMIT"
          fi

          release_id="$(gh release view "$RELEASE_TAG" --json databaseId --jq .databaseId)"
          if [[ -z "$release_id" || "$release_id" == "null" ]]; then
            echo "::error::Failed to resolve GitHub release id for $RELEASE_TAG."
            exit 1
          fi

          echo "release_id=$release_id" >> "$GITHUB_OUTPUT"

  build-release:
    needs: create-release
    strategy:
      fail-fast: false
      max-parallel: 1
      matrix:
        include:
          - platform: 'ubuntu-24.04'
            args: ''

          - platform: 'windows-latest'
            args: ''

          - platform: 'macos-latest'
            args: '--target x86_64-apple-darwin'

          - platform: 'macos-latest'
            args: '--target aarch64-apple-darwin'

    runs-on: ${{ matrix.platform }}
    env:
      RELEASE_ID: ${{ needs.create-release.outputs.release_id }}
      RELEASE_TAG: ${{ needs.create-release.outputs.release_tag }}
      RELEASE_COMMIT: ${{ needs.create-release.outputs.release_commit }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.2
        with:
          ref: ${{ env.RELEASE_TAG }}

      - name: Setup Node.js
        uses: actions/setup-node@v6.4.0
        with:
          node-version: lts/*

      - name: Install pnpm
        uses: pnpm/action-setup@v6.0.8
        with:
          version: 9

      - name: Clone and build state-sync
        run: |
          git clone --depth 1 https://github.com/777genius/state-sync.git ../state-sync
          cd ../state-sync
          pnpm install
          pnpm build

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2.9.1
        with:
          workspaces: './src-tauri -> target'

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-24.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            build-essential \
            curl \
            wget \
            file \
            libxdo-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libasound2-dev \
            pkg-config

      - name: Import Apple certificate
        if: matrix.platform == 'macos-latest'
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          CERTIFICATE_PATH=$RUNNER_TEMP/certificate.p12
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          KEYCHAIN_PASSWORD=$(openssl rand -base64 32)

          echo -n "$APPLE_CERTIFICATE" | base64 --decode > $CERTIFICATE_PATH

          security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH

          security import $CERTIFICATE_PATH -P "$APPLE_CERTIFICATE_PASSWORD" \
            -A -t cert -f pkcs12 -k $KEYCHAIN_PATH
          security set-key-partition-list -S apple-tool:,apple: \
            -s -k "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security list-keychain -d user -s $KEYCHAIN_PATH $(security list-keychains -d user | sed s/\"//g)

      - name: Install frontend dependencies
        run: pnpm install

      - name: Build and release
        uses: tauri-apps/tauri-action@v0.6.2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          APPLE_SIGNING_IDENTITY: 'Developer ID Application: Oleksii Zelenko (6C84CW694S)'
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          VITE_API_URL: https://api.voicetext.site
          VOICE_TO_TEXT_BACKEND_URL: wss://api.voicetext.site
        with:
          releaseId: ${{ env.RELEASE_ID }}
          releaseCommitish: ${{ env.RELEASE_COMMIT }}
          tagName: ${{ env.RELEASE_TAG }}
          retryAttempts: 3
          uploadUpdaterJson: true
          uploadUpdaterSignatures: true
          args: ${{ matrix.args }}

  verify-release:
    needs:
      - create-release
      - build-release
    runs-on: ubuntu-24.04
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      RELEASE_TAG: ${{ needs.create-release.outputs.release_tag }}

    steps:
      - name: Verify GitHub release assets and updater manifest
        shell: bash
        run: |
          set -euo pipefail

          version="${RELEASE_TAG#v}"
          latest_tag="$(gh release view --json tagName --jq .tagName)"
          if [[ "$latest_tag" != "$RELEASE_TAG" ]]; then
            echo "::error::Latest GitHub release is $latest_tag, expected $RELEASE_TAG."
            exit 1
          fi

          assets="$(gh release view "$RELEASE_TAG" --json assets --jq '.assets[].name')"
          required_assets=(
            latest.json
            "VoicetextAI_${version}_aarch64.dmg"
            "VoicetextAI_aarch64.app.tar.gz"
            "VoicetextAI_aarch64.app.tar.gz.sig"
            "VoicetextAI_${version}_x64.dmg"
            "VoicetextAI_x64.app.tar.gz"
            "VoicetextAI_x64.app.tar.gz.sig"
            "VoicetextAI_${version}_x64_en-US.msi"
            "VoicetextAI_${version}_x64_en-US.msi.sig"
            "VoicetextAI_${version}_amd64.deb"
            "VoicetextAI_${version}_amd64.deb.sig"
            "VoicetextAI_${version}_amd64.AppImage"
            "VoicetextAI_${version}_amd64.AppImage.sig"
          )

          for asset in "${required_assets[@]}"; do
            if ! grep -Fxq "$asset" <<< "$assets"; then
              echo "::error::Release asset is missing: $asset"
              exit 1
            fi
          done

          curl --fail --location --silent --show-error \
            "https://github.com/${GITHUB_REPOSITORY}/releases/download/${RELEASE_TAG}/latest.json" \
            --output latest.json

          jq -e --arg version "$version" '.version == $version' latest.json >/dev/null

          required_platforms=(
            darwin-aarch64
            darwin-aarch64-app
            darwin-x86_64
            darwin-x86_64-app
            linux-x86_64
            linux-x86_64-appimage
            linux-x86_64-deb
            windows-x86_64
            windows-x86_64-msi
          )

          for platform in "${required_platforms[@]}"; do
            jq -e --arg platform "$platform" \
              '.platforms[$platform].url and .platforms[$platform].signature' \
              latest.json >/dev/null
          done
