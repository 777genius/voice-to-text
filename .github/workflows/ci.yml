name: CI

on:
  push:
    branches:
      - master
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  quality-gates:
    uses: ./.github/workflows/quality-gates.yml
    with:
      ref: ${{ github.event.pull_request.head.sha || github.sha }}
