name: macOS Audio Release Gate

on:
  workflow_dispatch:
    inputs:
      ref:
        description: 'Release tag or commit to verify'
        required: true
        type: string
      soak_seconds:
        description: 'Long-session duration; release evidence requires at least 1800 seconds'
        required: true
        default: '1800'
        type: string

permissions:
  contents: read

concurrency:
  group: macos-audio-gate-${{ inputs.ref }}
  cancel-in-progress: false

jobs:
  audio-gate:
    runs-on: [self-hosted, macOS, voicetext-audio]
    timeout-minutes: 180

    steps:
      - name: Checkout requested revision
        uses: actions/checkout@v6.0.2
        with:
          ref: ${{ inputs.ref }}
          fetch-depth: 0

      - name: Validate release soak duration and GUI session
        shell: bash
        env:
          SOAK_SECONDS: ${{ inputs.soak_seconds }}
        run: |
          set -euo pipefail

          if [[ ! "$SOAK_SECONDS" =~ ^[0-9]+$ ]] || (( SOAK_SECONDS < 1800 )); then
            echo "::error::Release audio evidence requires soak_seconds >= 1800."
            exit 1
          fi
          session_info="$(ioreg -n Root -d1)"
          if grep -q '"CGSSessionScreenIsLocked"=Yes' <<< "$session_info"; then
            echo "::error::The macOS GUI session is locked; ScreenCaptureKit cannot expose a shareable display."
            exit 1
          fi

      - name: Setup Node.js
        uses: actions/setup-node@v6.4.0
        with:
          node-version: lts/*

      - name: Install pnpm
        uses: pnpm/action-setup@v6.0.8
        with:
          version: 9.15.9

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2.9.1
        with:
          workspaces: './src-tauri -> target'

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Install macOS audio route test dependency
        run: brew install switchaudio-osx

      - name: Run native and paid full-duplex smoke gates
        env:
          VOICETEXT_RUN_PAID_E2E: '1'
          OPENAI_E2E_API_KEY: ${{ secrets.OPENAI_E2E_API_KEY }}
        run: pnpm e2e:live-audio

      - name: Run measured 30-minute translation soaks
        env:
          VOICETEXT_RUN_PAID_E2E: '1'
          OPENAI_E2E_API_KEY: ${{ secrets.OPENAI_E2E_API_KEY }}
          LIVE_AUDIO_SOAK_SECONDS: ${{ inputs.soak_seconds }}
        run: pnpm e2e:live-audio-soak

      - name: Write gate evidence
        shell: bash
        env:
          EVIDENCE_REF: ${{ inputs.ref }}
          SOAK_SECONDS: ${{ inputs.soak_seconds }}
        run: |
          set -euo pipefail
          smoke_summary="src-tauri/target/e2e-artifacts/live-audio-smoke-summary.json"
          soak_summary="src-tauri/target/e2e-artifacts/live-audio-soak-summary.json"
          matrix_summary="src-tauri/target/e2e-artifacts/incoming-spoken-paid-matrix/matrix-summary.json"
          required_matrix_ids='["english_to_russian","names_and_numbers","technical_terms","mixed_english_russian","already_russian","long_context","pause_and_silence","overlapping_speakers","half_volume_source"]'
          required_audio_ids='["english_to_russian","names_and_numbers","technical_terms","mixed_english_russian","long_context","pause_and_silence","overlapping_speakers","half_volume_source"]'
          test -s "$smoke_summary"
          test -s "$soak_summary"
          test -s "$matrix_summary"
          jq -e '
            .schema_version == 1 and
            .platform == "darwin" and
            (.passed_labels | index("tauri-exit-shutdown-callback-binding")) != null and
            (.passed_labels | index("translation-shutdown-claim-idempotence")) != null and
            (.passed_labels | index("bidirectional-runtime-abort-helper")) != null and
            (.passed_labels | index("suspension-watchdog-terminal-signal")) != null and
            (.passed_labels | index("incoming-terminal-capture-service-cleanup")) != null and
            (.passed_labels | index("local-websocket-abrupt-close")) != null and
            (.passed_labels | index("outgoing-unexpected-close-service-cleanup")) != null and
            (.passed_labels | index("output-health-terminal-signal")) != null and
            (.passed_labels | index("incoming-output-terminal-service-cleanup")) != null and
            (.passed_labels | index("incoming-system-default-playback")) != null and
            (.passed_labels | index("macos-default-output-switch")) != null and
            (.passed_labels | index("blackhole-loopback")) != null and
            (.passed_labels | index("incoming-native-capture-format")) != null and
            (.passed_labels | index("incoming-playback-nine-second-burst")) != null and
            (.passed_labels | index("incoming-native-self-exclusion")) != null and
            (.passed_labels | index("outgoing-live-translation-service")) != null and
            (.passed_labels | index("incoming-captions-regression")) != null and
            (.passed_labels | index("incoming-spoken-paid-matrix")) != null and
            (.passed_labels | index("incoming-spoken-stop-mid-phrase")) != null and
            (.passed_labels | index("incoming-spoken-paid-network-interruption")) != null and
            (.passed_labels | index("paid-full-duplex-independent-stop")) != null
          ' "$smoke_summary" >/dev/null
          jq -e \
            --argjson expected_soak_seconds "$SOAK_SECONDS" \
            '.schema_version == 1 and
             .platform == "darwin" and
             .release_grade == true and
             .soak_seconds == $expected_soak_seconds and
             (.passed_labels | index("blackhole-loopback-preflight")) != null and
             (.passed_labels | index("incoming-spoken-runtime-soak")) != null and
             (.passed_labels | index("outgoing-long-live-translation-soak")) != null and
             (.passed_labels | index("incoming-long-system-audio-soak")) != null' \
            "$soak_summary" >/dev/null
          jq -e \
            --argjson required_ids "$required_matrix_ids" \
            --argjson required_audio_ids "$required_audio_ids" \
            '.schema_version == 1 and
             .scenario_filter == "all" and
             .complete_release_matrix == true and
             .required_scenario_ids == $required_ids and
             .passed_scenario_ids == $required_ids and
             .required_audio_scenario_ids == $required_audio_ids and
             .audio_verified_scenario_ids == $required_audio_ids' \
            "$matrix_summary" >/dev/null

          mkdir -p audio-gate-evidence
          cp "$smoke_summary" "$soak_summary" "$matrix_summary" audio-gate-evidence/
          jq -n \
            --arg commit "$(git rev-parse HEAD)" \
            --arg ref "$EVIDENCE_REF" \
            --argjson soak_seconds "$SOAK_SECONDS" \
            --slurpfile smoke "$smoke_summary" \
            --slurpfile soak "$soak_summary" \
            --slurpfile matrix "$matrix_summary" \
            '{
              commit: $commit,
              ref: $ref,
              soak_seconds: $soak_seconds,
              smoke_passed: true,
              soak_passed: true,
              tauri_exit_shutdown_callback_bound: ($smoke[0].passed_labels | index("tauri-exit-shutdown-callback-binding") != null),
              shutdown_claim_idempotence_passed: ($smoke[0].passed_labels | index("translation-shutdown-claim-idempotence") != null),
              bidirectional_runtime_abort_helper_passed: ($smoke[0].passed_labels | index("bidirectional-runtime-abort-helper") != null),
              suspension_signal_and_capture_cleanup_contracts_passed: (($smoke[0].passed_labels | index("suspension-watchdog-terminal-signal") != null) and ($smoke[0].passed_labels | index("incoming-terminal-capture-service-cleanup") != null)),
              local_and_runtime_close_contracts_passed: (($smoke[0].passed_labels | index("local-websocket-abrupt-close") != null) and ($smoke[0].passed_labels | index("outgoing-unexpected-close-service-cleanup") != null)),
              output_signal_and_service_cleanup_contracts_passed: (($smoke[0].passed_labels | index("output-health-terminal-signal") != null) and ($smoke[0].passed_labels | index("incoming-output-terminal-service-cleanup") != null)),
              system_default_playback_passed: ($smoke[0].passed_labels | index("incoming-system-default-playback") != null),
              macos_default_output_switch_detected: ($smoke[0].passed_labels | index("macos-default-output-switch") != null),
              blackhole_loopback_passed: ($smoke[0].passed_labels | index("blackhole-loopback") != null),
              incoming_native_capture_format_passed: ($smoke[0].passed_labels | index("incoming-native-capture-format") != null),
              incoming_playback_burst_passed: ($smoke[0].passed_labels | index("incoming-playback-nine-second-burst") != null),
              outgoing_live_translation_passed: ($smoke[0].passed_labels | index("outgoing-live-translation-service") != null),
              incoming_captions_regression_passed: ($smoke[0].passed_labels | index("incoming-captions-regression") != null),
              incoming_stop_mid_phrase_passed: ($smoke[0].passed_labels | index("incoming-spoken-stop-mid-phrase") != null),
              incoming_paid_network_interruption_passed: ($smoke[0].passed_labels | index("incoming-spoken-paid-network-interruption") != null),
              paid_matrix_complete: $matrix[0].complete_release_matrix,
              paid_matrix: $matrix[0],
              smoke_checks: $smoke[0].passed_labels,
              soak_checks: $soak[0].passed_labels
            }' > audio-gate-evidence/evidence.json

      - name: Upload release evidence
        uses: actions/upload-artifact@v6
        with:
          name: macos-audio-gate-evidence
          path: audio-gate-evidence
          if-no-files-found: error
          retention-days: 30

      - name: Upload audio diagnostics
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: macos-audio-gate-artifacts-${{ github.run_attempt }}
          path: src-tauri/target/e2e-artifacts
          if-no-files-found: warn
          retention-days: 14
